<!DOCTYPE html>
<html lang="en">
    <head>
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="manifest" href="/site.webmanifest" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
            integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.min.js"
            integrity="sha384-IDwe1+LCz02ROU9k972gdyvl+AESN10+x7tBKgc9I5HFtuNz0wWnPclzo6p9vxnk"
            crossorigin="anonymous"
        ></script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Favorite Places</title>
        <style>
            .card {
                border-radius: 1em;
                text-align: center;
            }
            .card:hover {
                background-color: rgba(0, 0, 0, 0.04);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand p-0" href="/">
                    <img
                        src="ALISA.png"
                        alt="Cat Name Logo: 'ALISA'"
                        width="145"
                    />
                </a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                aria-current="page"
                                href="index.html"
                                >Home</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/"
                                >Favorite Places</a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container my-5">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-5">
                <div class="col">
                    <div class="card" style="width: 22rem">
                        <img
                            src="place1.png"
                            class="card-img-top"
                            alt="My image"
                        />
                        <div class="card-body">
                            <h5 class="card-title">My Observation Post</h5>
                            <p class="card-text">
                                Here I like to look at the birds, the trees and
                                the sky.
                            </p>
                            <a
                                href="place1.png"
                                class="btn btn-primary"
                                target="_blank"
                                >Large Photo</a
                            >
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card" style="width: 22rem">
                        <img
                            src="place2.png"
                            class="card-img-top"
                            alt="Sleep Cat Alisa Zone"
                        />
                        <div class="card-body">
                            <h5 class="card-title">My Sleep Zone</h5>
                            <p class="card-text">
                                Here I like to sleep a lot and sometimes watch
                                the TV with my family.
                            </p>
                            <a
                                href="place2.png"
                                class="btn btn-primary"
                                target="_blank"
                                >Large Photo</a
                            >
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card" style="width: 22rem">
                        <img
                            src="place3.png"
                            class="card-img-top"
                            alt="My image"
                        />
                        <div class="card-body">
                            <h5 class="card-title">The Place Where I Eat</h5>
                            <p class="card-text">
                                Here I eat my favorite food and drink my water.
                            </p>
                            <a
                                href="place3.png"
                                class="btn btn-primary"
                                target="_blank"
                                >Large Photo</a
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
